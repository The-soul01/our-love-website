<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Our Story</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Full‑screen lock page */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('images/page1_bg.png') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .lock-container {
            background: rgba(0, 0, 0, 0.5);
            padding: 2rem;
            border-radius: 10px;
            max-width: 90%;
        }
        .lock-container h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .lock-container p {
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        .lock-input {
            padding: 0.7rem;
            font-size: 1.2rem;
            border-radius: 5px;
            border: none;
            width: 8rem;
            text-align: center;
        }
        .unlock-btn {
            margin-top: 1rem;
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            background: #b80044;
            color: white;
            cursor: pointer;
        }
        .error {
            color: #ffb3b3;
            margin-top: 0.5rem;
            display: none;
        }
        /* Responsive adjustments */
        @media (max-width: 600px) {
            .lock-container h1 {
                font-size: 1.5rem;
            }
            .lock-input {
                width: 6rem;
            }
        }
    </style>
</head>
<body>
    <div class="lock-container">
        <h1>Enter the Passcode</h1>
        <p>Our special date unlocks the memories. 4‑digit code:</p>
        <input type="password" id="passcode" class="lock-input" placeholder="----">
        <br>
        <button class="unlock-btn" onclick="checkCode()">Unlock</button>
        <p id="error-msg" class="error">Incorrect code. Please try again.</p>
    </div>
    <!-- Background music: original instrumental created to capture the mood of “Dekha Hi Nahi” -->
    <!-- Hidden to keep the lock screen clean while still playing in the background -->
    <audio id="bg-music" autoplay loop style="display:none;">
        <source src="audio/dekha_hi_nahi_instrumental.wav" type="audio/wav">
        Your browser does not support the audio element.
    </audio>
    <script>
    // Passcode check function
    function checkCode() {
        const code = document.getElementById('passcode').value.trim();
        if (code === '2107') {
            window.location.href = 'message1.html';
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }
    </script>
</body>
</html>
