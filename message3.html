<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever &amp; Always</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('images/page4_bg.png') no-repeat center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c003e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .forever-box {
            background: rgba(255,255,255,0.85);
            padding: 2rem;
            border-radius: 10px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .forever-box h1 {
            color: #b80044;
            margin-bottom: 1rem;
        }
        .forever-box p {
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
        }
        .hearts {
            font-size: 2rem;
            color: #b80044;
            margin-top: 1rem;
        }
        .button-container {
            margin-top: 2rem;
            text-align: center;
        }
        .btn {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            background: #b80044;
            color: white;
            cursor: pointer;
            margin: 0 0.5rem;
        }
    </style>
</head>
<body>
    <div class="forever-box">
        <h1>Forever &amp; Always</h1>
        <p>Our love is not just for a moment, it is a promise that will last a lifetime. Through all the ups and downs, I will stand by your side.</p>
        <p>You make every day brighter, every moment sweeter, and every dream worth chasing. Thank you for being my everything.</p>
        <div class="hearts">❤️ ❤️ ❤️</div>
        <div class="button-container">
            <button class="btn" onclick="window.location.href='message2.html'">Back</button>
            <button class="btn" onclick="window.location.href='journey.html'">Next</button>
        </div>
    </div>
    <!-- Background music for message pages -->
    <audio autoplay loop style="display:none;">
        <source src="audio/dekha_hi_nahi_instrumental.wav" type="audio/wav">
    </audio>
</body>
</html>
